<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – PUP OUS - PAMS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/webp" href="../assets/pup_ous_seal.webp">
</head>

<body class="login-container">
    <div class="login-box">
        <a href="personnel-auth.html" class="color-maroon fw-600 d-block mb-4 back-link no-underline">
            <i class="fas fa-arrow-left"></i> Back to Sign In
        </a>
        <img src="../assets/pup_ous_seal.webp" alt="PUP Logo" class="login-logo">
        <h1 class="color-maroon fw-700 text-sm mt-1">RESET YOUR PASSWORD</h1>
        <p class="color-gray text-xs mb-4" id="stepHint">
            Enter the email tied to your PAMS account. We will send you a verification code.
        </p>

        <!-- STEP 1: Request -->
        <form id="requestForm" class="mt-2" aria-label="Request password reset code">
            <div class="form-group">
                <label class="form-label" for="reset-email">Email Address</label>
                <input type="email" id="reset-email" name="email" class="form-control"
                    placeholder="personnel@pup.edu.ph" required aria-required="true" autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary w-full mt-2">
                <i class="fas fa-paper-plane" aria-hidden="true"></i> Send Verification Code
            </button>
        </form>

        <!-- STEP 2: Confirm — new password + code -->
        <form id="confirmForm" class="mt-2 hidden" aria-label="Confirm reset code and set new password">
            <div class="form-group">
                <label class="form-label" for="reset-code">Verification Code</label>
                <input type="text" id="reset-code" name="code" class="form-control"
                    inputmode="numeric" maxlength="6" autocomplete="one-time-code"
                    placeholder="6-digit code" required aria-required="true">
            </div>
            <div class="form-group">
                <label class="form-label" for="reset-new-password">New Password</label>
                <div class="password-field-wrap">
                    <input type="password" id="reset-new-password" name="newPassword" class="form-control"
                        placeholder="••••••••" required aria-required="true" minlength="8">
                    <button type="button" class="pass-toggle"
                        onclick="togglePasswordVisibility('reset-new-password', this)"
                        aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="reset-confirm-password">Confirm New Password</label>
                <div class="password-field-wrap">
                    <input type="password" id="reset-confirm-password" name="confirmPassword" class="form-control"
                        placeholder="••••••••" required aria-required="true" minlength="8">
                    <button type="button" class="pass-toggle"
                        onclick="togglePasswordVisibility('reset-confirm-password', this)"
                        aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full mt-2">
                <i class="fas fa-key" aria-hidden="true"></i> Reset Password
            </button>
            <div class="mt-3 text-xs text-center">
                <button type="button" id="resendCodeBtn" class="color-maroon fw-600 no-underline"
                    style="background:none;border:none;cursor:pointer;font-family:inherit;">
                    Didn't get the code? Resend.
                </button>
            </div>
        </form>

        <!-- STEP 3: Done -->
        <div id="doneStep" class="mt-2 hidden text-center" aria-live="polite">
            <div class="otp-modal-icon" style="margin-top:.5rem;">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="color-maroon fw-700 text-sm mt-2">Password Updated</h2>
            <p class="color-gray text-xs mb-4 mt-1">
                Your password has been reset. You can now sign in with your new credentials.
            </p>
            <a href="personnel-auth.html" class="btn btn-primary w-full">
                <i class="fas fa-arrow-right-to-bracket" aria-hidden="true"></i> Go to Sign In
            </a>
        </div>

        <div class="mt-4 text-xs color-gray text-center">
            &copy; 2026 PUP OUS – Internal System
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/otpClient.js"></script>
    <script src="../js/forgotPassword.js"></script>
    <script>
        // Shared password-eye toggle (mirrors auth.js since this page is standalone).
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }
    </script>
</body>

</html>
