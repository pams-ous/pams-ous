<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – PUP OUS - PAMS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/webp" href="../assets/pup_ous_seal.webp">
    <script src="../js/boot.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-star">
                <img src="../assets/pup_ous_seal.webp" alt="PUP OUS Seal">
            </div>
            <div>
                <div class="brand-name">PUP OUS</div>
                <div class="brand-sub">Accomplishment System</div>
            </div>
        </div>

        <nav class="nav-group">
            <div class="nav-label">Main</div>
            <a href="dashboard.html" class="nav-item active">
                <i class="fa-solid fa-table-columns"></i> Dashboard
            </a>
            <a href="task-board.html" class="nav-item">
                <i class="fa-solid fa-table-list"></i> Task Board
            </a>
            <a href="my-tasks.html" class="nav-item">
                <i class="fa-solid fa-clipboard-list"></i> My Tasks
            </a>
        </nav>

        <nav class="nav-group" data-admin-only>
            <div class="nav-label">Management</div>
            <a href="reports.html" class="nav-item">
                <i class="fa-solid fa-chart-bar"></i> Reports
            </a>
            <a href="users-groups.html" class="nav-item">
                <i class="fa-solid fa-users"></i> Users & Groups
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">?</div>
                <div>
                    <div class="user-name">—</div>
                    <div class="user-role">—</div>
                </div>
            </div>
            <button class="logout-btn" onclick="PAMS.logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div class="alert-banner hidden" id="alertBanner">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="alertText"></span> <a href="my-tasks.html">View Tasks</a>
        </div>

        <div class="content">
            <!-- Page Header -->
            <div class="page-header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                    <p id="welcomeText">Welcome back</p>
                </div>
                <div class="header-right">
                    <span class="header-date" id="headerDate"></span>
                    <div class="notif-wrap">
                        <button class="bell-btn" title="Notifications">
                            <i class="fa-solid fa-bell"></i>
                            <span class="notif-dot"></span>
                        </button>
                        <div class="notif-popover">
                            <div class="notif-header">Notifications</div>
                            <div class="notif-body"></div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="window.location.href='task-board.html'">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>
                </div>
            </div>

            <!-- Stat Cards -->
            <div class="stat-grid">
                <div class="stat-card s-total">
                    <div class="stat-icon-wrap"><i class="fa-solid fa-list-check"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="cnt-total">0</div>
                        <div class="stat-lbl">Total Tasks</div>
                    </div>
                </div>
                <div class="stat-card s-done">
                    <div class="stat-icon-wrap"><i class="fa-solid fa-circle-check"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="cnt-completed">0</div>
                        <div class="stat-lbl">Completed</div>
                    </div>
                </div>
                <div class="stat-card s-progress">
                    <div class="stat-icon-wrap"><i class="fa-solid fa-circle-notch"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="cnt-inprogress">0</div>
                        <div class="stat-lbl">In Progress</div>
                    </div>
                </div>
                <div class="stat-card s-overdue">
                    <div class="stat-icon-wrap"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="cnt-overdue">0</div>
                        <div class="stat-lbl">Overdue</div>
                    </div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="charts-row">
                <div class="panel">
                    <div class="panel-head">
                        <div class="panel-title"><i class="fa-solid fa-chart-bar"></i> Tasks by Status per Group</div>
                    </div>
                    <div class="bar-box">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-head">
                        <div class="panel-title"><i class="fa-solid fa-chart-pie"></i> Priority Split</div>
                    </div>
                    <div class="donut-box">
                        <canvas id="donutChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Bottom Row -->
            <div class="bottom-row">
                <div class="panel">
                    <div class="panel-head">
                        <div class="panel-title"><i class="fa-solid fa-bolt"></i> Recent Accomplishments</div>
                        <button class="btn btn-outline" style="padding: 4px 12px; font-size: 12px;"
                            onclick="window.location.href='my-tasks.html'">View All</button>
                    </div>
                    <div class="acc-list" id="accList"></div>
                </div>

                <div class="panel">
                    <div class="panel-head">
                        <div class="panel-title"><i class="fa-solid fa-users"></i> Group Progress</div>
                    </div>
                    <div class="gp-list" id="gpList"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Configuration and API Logic -->
	<script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
