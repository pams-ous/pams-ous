<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – PUP OUS</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-star">
                <img src="../assets/pup_ous_seal.webp" alt="PUP OUS Seal">
            </div>
            <div>
                <div class="brand-name">PUP OUS</div>
                <div class="brand-sub">Accomplishment System</div>
            </div>
        </div>

        <nav class="nav-group">
            <div class="nav-label">Main</div>
            <a href="dashboard.html" class="nav-item active">
                <i class="fa-solid fa-table-columns"></i> Dashboard
            </a>
            <a href="task-board.html" class="nav-item">
                <i class="fa-solid fa-table-list"></i> Task Board
            </a>
            <a href="my-tasks.html" class="nav-item">
                <i class="fa-solid fa-clipboard-list"></i> My Tasks
            </a>
        </nav>

        <nav class="nav-group" data-admin-only>
            <div class="nav-label">Management</div>
            <a href="reports.html" class="nav-item">
                <i class="fa-solid fa-chart-bar"></i> Reports
            </a>
            <a href="users-groups.html" class="nav-item">
                <i class="fa-solid fa-users"></i> Users & Groups
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">?</div>
                <div>
                    <div class="user-name">—</div>
                    <div class="user-role">—</div>
                </div>
            </div>
            <button class="logout-btn" onclick="PAMS.logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div class="alert-banner hidden" id="alertBanner">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="alertText"></span> <a href="my-tasks.html">View Tasks</a>
        </div>

        <div class="content">
            <!-- Page Header -->
            <div class="page-header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                    <p id="welcomeText">Welcome back</p>
                </div>
                <div class="header-right">
                    <span class="header-date" id="headerDate"></span>
                    <div class="notif-wrap">
                        <button class="bell-btn" title="Notifications">
                            <i class="fa-solid fa-bell"></i>
                            <span class="notif-dot"></span>
                        </button>
                        <div class="notif-popover">
                            <div class="notif-header">Notifications</div>
                            <div class="notif-body"></div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="window.location.href='task-board.html'">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>
                </div>
            </div>

            <!-- Stat Cards -->
            <div class="stat-grid">
                <div class="stat-card s-total">
                    <div class="stat-icon-wrap"><i class="fa-solid fa-list-check"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="cnt-total">0</div>
                        <div class="stat-lbl">Total Tasks</div>
                    </div>
                </div>
                <div class="stat-card s-done">
                    <div class="stat-icon-wrap"><i class="fa-solid fa-circle-check"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="cnt-completed">0</div>
                        <div class="stat-lbl">Completed</div>
                    </div>
                </div>
                <div class="stat-card s-progress">
                    <div class="stat-icon-wrap"><i class="fa-solid fa-circle-notch"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="cnt-inprogress">0</div>
                        <div class="stat-lbl">In Progress</div>
                    </div>
                </div>
                <div class="stat-card s-overdue">
                    <div class="stat-icon-wrap"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="stat-body">
                        <div class="stat-num" id="cnt-overdue">0</div>
                        <div class="stat-lbl">Overdue</div>
                    </div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="charts-row">
                <div class="panel">
                    <div class="panel-head">
                        <div class="panel-title"><i class="fa-solid fa-chart-bar"></i> Tasks by Status per Group</div>
                    </div>
                    <div class="bar-box">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-head">
                        <div class="panel-title"><i class="fa-solid fa-chart-pie"></i> Priority Split</div>
                    </div>
                    <div class="donut-box">
                        <canvas id="donutChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Bottom Row -->
            <div class="bottom-row">
                <div class="panel">
                    <div class="panel-head">
                        <div class="panel-title"><i class="fa-solid fa-bolt"></i> Recent Accomplishments</div>
                        <button class="btn btn-outline" style="padding: 4px 12px; font-size: 12px;" onclick="window.location.href='my-tasks.html'">View All</button>
                    </div>
                    <div class="acc-list" id="accList"></div>
                </div>

                <div class="panel">
                    <div class="panel-head">
                        <div class="panel-title"><i class="fa-solid fa-users"></i> Group Progress</div>
                    </div>
                    <div class="gp-list" id="gpList"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Configuration and API Logic -->
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script>
        const { apiFetch, requireAuth, setupChrome, fmtHeaderDate, getUser } = PAMS;

        let barChart, donutChart;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!requireAuth()) return;
            setupChrome();

            const u = getUser();
            if (u) {
                document.getElementById('welcomeText').textContent = `Welcome back, ${u.firstName || u.name || ''}`;
            }
            document.getElementById('headerDate').textContent = fmtHeaderDate();

            try {
                // In mock mode, this will return sample data defined in the fetch wrapper if implemented, 
                // or we can handle it here for now.
                const stats = await apiFetch('/dashboard/stats');
                renderStats(stats);
            } catch (err) {
                console.error('Failed to load dashboard:', err);
                
                // If in mock mode and fetch fails (since /dashboard/stats isn't in auth.js mock logic),
                // we can provide dummy data for UI testing.
                if (CONFIG.USE_MOCK_API) {
                    renderStats({
                        counts: { total: 24, completed: 15, inProgress: 6, overdue: 3 },
                        byGroup: [
                            { group: 'Student Records', pending: 2, inProgress: 3, completed: 8, cancelled: 1 },
                            { group: 'Admission', pending: 1, inProgress: 2, completed: 5, cancelled: 0 },
                            { group: 'Head Office', pending: 0, inProgress: 1, completed: 2, cancelled: 0 }
                        ],
                        priority: { LOW: 10, MEDIUM: 8, HIGH: 4, URGENT: 2 },
                        recentUpdates: [
                            { name: 'Juan Dela Cruz', text: 'Completed student record filing', time: new Date() },
                            { name: 'Maria Santos', text: 'Started admission review', time: new Date(Date.now() - 3600000) }
                        ],
                        groupProgress: [
                            { name: 'Student Records', completed: 8, total: 14 },
                            { name: 'Admission', completed: 5, total: 8 }
                        ]
                    });
                }
            }
        });

        function renderStats(s) {
            // 1. Stat cards
            document.getElementById('cnt-total').textContent      = s.counts.total;
            document.getElementById('cnt-completed').textContent  = s.counts.completed;
            document.getElementById('cnt-inprogress').textContent = s.counts.inProgress;
            document.getElementById('cnt-overdue').textContent    = s.counts.overdue;

            // 2. Overdue alert
            if (s.counts.overdue > 0) {
                const banner = document.getElementById('alertBanner');
                document.getElementById('alertText').textContent = 
                    `${s.counts.overdue} task${s.counts.overdue > 1 ? 's are' : ' is'} overdue.`;
                banner.classList.remove('hidden');
            }

            // 3. Bar Chart
            const barCtx = document.getElementById('barChart').getContext('2d');
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: s.byGroup.map(g => g.group),
                    datasets: [
                        { label: 'Pending', data: s.byGroup.map(g => g.pending), backgroundColor: '#f59e0b' },
                        { label: 'In Progress', data: s.byGroup.map(g => g.inProgress), backgroundColor: '#3b82f6' },
                        { label: 'Completed', data: s.byGroup.map(g => g.completed), backgroundColor: '#16a34a' },
                        { label: 'Cancelled', data: s.byGroup.map(g => g.cancelled), backgroundColor: '#9ca3af' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: { family: 'Poppins', size: 11 } } } },
                    scales: {
                        x: { stacked: true, grid: { display: false } },
                        y: { stacked: true, beginAtZero: true, grid: { color: '#f3f4f6' } }
                    }
                }
            });

            // 4. Donut Chart
            const donutCtx = document.getElementById('donutChart').getContext('2d');
            donutChart = new Chart(donutCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Low', 'Medium', 'High', 'Urgent'],
                    datasets: [{
                        data: [s.priority.LOW, s.priority.MEDIUM, s.priority.HIGH, s.priority.URGENT],
                        backgroundColor: ['#9ca3af', '#3b82f6', '#f97316', '#dc2626'],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: { family: 'Poppins', size: 11 } } } }
                }
            });

            // 5. Recent accomplishments
            const accList = document.getElementById('accList');
            if (s.recentUpdates.length === 0) {
                accList.innerHTML = '<div class="text-xs color-gray text-center py-4">No recent activity.</div>';
            } else {
                accList.innerHTML = s.recentUpdates.map(u => `
                    <div class="acc-item">
                        <div class="acc-dot ${/complet/i.test(u.text) ? 'green' : 'blue'}"></div>
                        <div class="acc-body">
                            <div class="acc-text"><strong>${u.name}</strong>: ${u.text}</div>
                            <div class="acc-time"><i class="fa-regular fa-clock"></i> ${new Date(u.time).toLocaleTimeString()}</div>
                        </div>
                    </div>
                `).join('');
            }

            // 6. Group progress
            const gpList = document.getElementById('gpList');
            if (s.groupProgress.length === 0) {
                gpList.innerHTML = '<div class="text-xs color-gray text-center py-4">No groups assigned.</div>';
            } else {
                gpList.innerHTML = s.groupProgress.map(g => {
                    const pct = g.total > 0 ? Math.round((g.completed / g.total) * 100) : 0;
                    return `
                        <div>
                            <div class="gp-top">
                                <span class="gp-name">${g.name}</span>
                                <span class="gp-pct">${pct}%</span>
                            </div>
                            <div class="gp-track"><div class="gp-fill" style="width:${pct}%"></div></div>
                            <div class="gp-sub">${g.completed} / ${g.total} tasks completed</div>
                        </div>
                    `;
                }).join('');
            }
        }
    </script>
</body>
</html>
