<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accomplishments – PUP OUS - PAMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/1-variables.css">
    <link rel="stylesheet" href="../css/2-base.css">
    <link rel="stylesheet" href="../css/3-layout.css">
    <link rel="stylesheet" href="../css/4-pages.css">
    <link rel="stylesheet" href="../css/5-features.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="icon" type="image/webp" href="../assets/pup_ous_seal.webp">
    <script src="../js/boot.js"></script>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-star">
                <img src="../assets/pup_ous_seal.webp" alt="PUP OUS Seal">
            </div>
            <div>
                <div class="brand-name">PUP OUS</div>
                <div class="brand-sub">Accomplishment System</div>
            </div>
        </div>

        <nav class="nav-group">
            <div class="nav-label">Main</div>
            <a href="dashboard.html" class="nav-item">
                <i class="fa-solid fa-table-columns"></i> Dashboard
            </a>
            <a href="task-board.html" class="nav-item">
                <i class="fa-solid fa-table-list"></i> Task Board
            </a>
            <a href="my-tasks.html" class="nav-item">
                <i class="fa-solid fa-clipboard-list"></i> My Tasks
            </a>
        </nav>

        <nav class="nav-group" data-admin-only>
            <div class="nav-label">Management</div>
            <a href="reports.html" class="nav-item">
                <i class="fa-solid fa-chart-bar"></i> Reports
            </a>
            <a href="users-groups.html" class="nav-item">
                <i class="fa-solid fa-users"></i> Users & Groups
            </a>
            <a href="accomplishments.html" class="nav-item active">
                <i class="fa-regular fa-circle-check"></i> Accomplishments
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">?</div>
                <div>
                    <div class="user-name">—</div>
                    <div class="user-role">—</div>
                </div>
            </div>
            <button class="logout-btn" onclick="PAMS.logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div class="content">
            <!-- Page Header -->
            <div class="page-header">
                <div class="header-left">
                    <h1>Accomplishments</h1>
                    <p>All logged task activity</p>
                </div>
                <div class="header-right">
                    <span class="header-date" id="headerDate"></span>
                    <div class="notif-wrap">
                        <button class="bell-btn" title="Notifications">
                            <i class="fa-solid fa-bell"></i>
                            <span class="notif-dot"></span>
                        </button>
                        <div class="notif-popover">
                            <div class="notif-header">Notifications</div>
                            <div class="notif-body"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Accomplishments List -->
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title"><i class="fa-regular fa-circle-check"></i> All Accomplishments</div>
                </div>
                <div class="acc-list" id="accList"></div>
            </div>
        </div>
    </main>

    <!-- Configuration and API Logic -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/accomplishments.js"></script>
</body>

</html>
